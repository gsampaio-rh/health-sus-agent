experiment:
  name: h2_dengue_early_warning
  hypothesis: H2
  description: Dengue Epidemic Early Warning for São Paulo

data:
  source: SINAN
  disease: DENG
  uf: SP
  uf_code: "35"
  confirmed_classi_fin: [10, 11, 12]  # Dengue, Dengue c/ alarme, Dengue grave
  period:
    train: [2017, 2023]     # 7 years
    validate: [2024, 2024]  # 1 year (massive epidemic — hard test)
    test: [2025, 2025]      # 1 year

time_series:
  granularity: weekly        # epidemiological week
  target: cases_per_week     # notification count
  epidemic_threshold: 300    # cases/100k population annualized
  sensitivity_thresholds: [200, 400]  # robustness check

features:
  lags: [1, 2, 3, 4, 6, 8]          # weeks back
  rolling_means: [4, 8, 12]          # rolling window sizes
  calendar:
    - epi_week
    - month
    - is_rainy_season               # Oct-Mar = 1
  trend:
    - year_index                    # linear trend
    - cases_same_week_last_year

forecast_horizons: [4, 8]  # weeks ahead

models:
  baseline:
    - majority_class                 # always predict "non-epidemic"
    - seasonal_naive                 # same week last year
  experimental:
    - lightgbm
    - xgboost

evaluation:
  metrics:
    - f1_epidemic_class
    - precision
    - recall
    - auc_roc
    - mape_regression               # for the count prediction
  bootstrap_iterations: 1000
  confidence_level: 0.95
  random_seed: 42

top_municipalities_by_cases: 50      # model per-municipality for top 50
